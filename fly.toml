# OpenClaw Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "radoclaw"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[processes]
  app = "/entrypoint.sh"

[http_service]
internal_port = 18789
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

  # Fly edge → machine connection
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 10
    hard_limit = 20

# ── Machine sizing ───────────────────────────────────────────────────────────
[[vm]]
  size   = "performance-2x"    # 2 shared vCPUs
  memory = "16gb"              # 8 192 MB RAM

# Single volume for both OpenClaw config and Ollama models
# Shared CPU instances only support 1 volume
[[mounts]]
source = "openclaw_data"
destination = "/root"


# ── Health check (used by Fly to decide when the machine is ready) ────────────
[checks]
  [checks.ollama_ready]
    grace_period = "60s"    # give first-boot model pull time
    interval     = "20s"
    timeout      = "10s"
    type         = "http"
    port         = 18789
    path         = "/"
    method       = "GET"

# ── Deployment strategy ───────────────────────────────────────────────────────
[deploy]
  strategy         = "immediate"   # don't wait for a second machine to be healthy
  release_command  = ""
