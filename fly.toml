# OpenClaw Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "koloclaw"
primary_region = "ams" # change to your closest region

[build]
dockerfile = "Dockerfile"

[processes]
  app = "/entrypoint.sh"

[http_service]
internal_port = 18789
force_https = true
auto_stop_machines = false # Keep running for persistent connections
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-2x"
memory = "8192mb"

# Single volume for both OpenClaw config and Ollama models
# Shared CPU instances only support 1 volume
[[mounts]]
source = "openclaw_data"
destination = "/root"